<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kuruluş ve Yükseliş Padişahları</title>
    <link rel="stylesheet" href="styles.css?v=20260701-instant-check">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Osmanlı Devleti</p>
          <h1>Kuruluş ve Yükseliş Padişahları</h1>
        </div>
        <div class="scoreboard" aria-live="polite">
          <span id="placedCount">0</span>
          <span class="muted">/</span>
          <span id="totalCount">0</span>
        </div>
      </header>

      <section class="control-band" aria-label="Kart kontrol alanı">
        <div class="draw-area">
          <div id="currentCardSlot" class="current-card-slot">
            <p class="empty-state">Kart bekliyor</p>
          </div>
        </div>
        <div id="choiceBar" class="choice-bar" aria-label="Padişah seçimleri"></div>
        <div class="actions">
          <button id="drawButton" class="primary-button" type="button">Yeni bilgi</button>
          <button id="finishButton" class="secondary-button" type="button" disabled>Kontrol et</button>
          <button id="hintToggleButton" class="hint-button" type="button" aria-expanded="false" aria-controls="hintPanel">İpucu</button>
          <button id="resetButton" class="ghost-button" type="button">Sıfırla</button>
        </div>
        <p id="statusText" class="status-text" aria-live="polite"></p>
      </section>

      <section id="hintPanel" class="hint-panel" aria-label="Kart ipucu" hidden>
        <div class="hint-header">
          <div>
            <p class="hint-kicker">Seçili bilgi</p>
            <h2>Kart İpucu</h2>
          </div>
          <div id="selectedHint" class="selected-hint" aria-live="polite"></div>
        </div>
      </section>

      <section id="columns" class="columns" aria-label="Padişah sütunları"></section>

      <section id="resultsPanel" class="results-panel" aria-live="polite" hidden></section>
    </main>

    <script src="app.js?v=20260701-instant-check"></script>
  </body>
</html>
